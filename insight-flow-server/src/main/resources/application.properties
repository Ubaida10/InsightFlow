spring.application.name=insight-flow-server
server.port=8080

# CORS
cors.allowed-origins=http://localhost:4200

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# MongoDB
spring.data.mongodb.uri=mongodb+srv://<User>:<password>@cluster0.kj42s.mongodb.net/InsightFlow?authSource=admin
spring.data.mongodb.auto-index-creation=true
management.health.mongo.enabled=false

# Gemini direct SDK (LabReportService)
gemini.api-key={GEMINI_API_KEY}

# Spring AI — Gemini Chat
spring.ai.google.genai.api-key={GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# Spring AI — Gemini Embeddings
spring.ai.google.genai.embedding.api-key={GEMINI_API_KEY}
spring.ai.google.genai.embedding.text.options.model=text-embedding-001
spring.ai.model.embedding.text=none

# Spring AI — MongoDB Atlas Vector Store
spring.ai.vectorstore.mongodb.atlas.collection-name=vector_store
spring.ai.vectorstore.mongodb.atlas.index-name=glossary_vector_index
spring.ai.vectorstore.mongodb.atlas.initialize-schema=true

# If ingest-on-startup is true, the glossary will be ingested into the vector store on application startup. Set to false to disable this behavior.
app.glossary.ingest-on-startup=false

# Logging
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.data.mongodb.core=DEBUG
